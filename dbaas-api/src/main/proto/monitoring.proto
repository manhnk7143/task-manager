syntax = "proto3";

option java_multiple_files = true;
option java_package = "grpc.model.monitoring";

package MONITORING;

service MonitoringService {
  rpc GetGraphInfras (GetGraphInfrasRequest) returns (GetGraphInfrasResponse) {}
  rpc HealthCheckService (HealthCheckServiceRequest) returns (HealthCheckServiceResponse) {}
  rpc GetMonascaStatistic (GetMonascaStatisticRequest) returns (GetMonascaStatisticResponse) {}
  rpc DeleteGroup (DeleteGroupRequest) returns (DeleteGroupResponse) {}

  rpc GetResourceExternals (GetResourceExternalsRequest) returns (GetResourceExternalsResponse) {}
}

message GetGraphInfrasRequest {
  string teamCodeId = 1;
  string portalProjectId = 2;
  string resourceValue = 3;
  string value = 4;
  string token = 5;
  string regionId = 6;
  string resourceName = 7;
  string resourceId = 8;
  string deviceName = 9;
  string deviceLabel = 10;
  string deviceId = 11;
  string dimensionValue = 12;
  string apiKey = 13;
}

message GetGraphInfrasResponse {
  int32 status = 1;
  string error = 2;
  string msg = 3;
  string currentTime = 4;
  GraphInfrasData data = 5;
}

message GraphInfrasData {
  repeated GraphInfras docs = 1;
  bool isAgent = 2;
  string linkDocs = 3;
}

message GraphInfras {
  int32 id = 1;
  string name = 2;
  string type = 3;
  string status = 4;
  int32 dashboardId = 5;
  int32 alarmRuleId = 6;
  string createdAt = 7;
  string updatedAt = 8;
  string xLabel = 9;
  string yLabel = 10;
  repeated QueryMetric queries = 11;
  GraphInfrasConfig graphInfrasConfig = 12;
  bool isListenerElb = 13;
}

message QueryMetric {
  int32 id = 1;
  string resourceValue = 2;
  string dimensionValue = 3;
  repeated MonitoredObjects monitoredObjects = 4;
  repeated string metricValues = 5;
  string nameQuery = 6;
  repeated Metrics metricQueries = 7;
  string category = 8;
}

message GraphInfrasConfig {
  bool show = 1;
  int32 sort = 2;
}

message MonitoredObjects {
  string resourceName = 1;
  string resourceId = 2;
  repeated Attachment attachments = 3;
  string deviceName = 4;
  string deviceLabel = 5;
  string deviceId = 6;
  string device = 7;
}

message Metrics {
  string metricLabel = 1;
  string metricValue = 2;
  string dimensionValue = 3;
  string dimensionLabel = 4;
}

message Attachment {
  string name = 1;
  string id = 2;
}

message HealthCheckServiceRequest{
  string teamCodeId = 1;
  string token = 2;
  string regionId = 3;
  string portalProjectId = 4;
  string resourceId = 5;
  string resourceTypeName = 6;
}

message HealthCheckServiceResponse {
  int32 status = 1;
  string error = 2;
  string msg = 3;
  string currentTime = 4;
  HealthCheckServiceData data = 5;
}

message HealthCheckServiceData {
  string status = 1;
  string message = 2;
  string resourceId = 3;
  string resourceName = 4;
}

message GetMonascaStatisticRequest {
  string token = 1;
  string regionId = 2;
  string portalProjectId = 3;
  string resourceValue = 4;
  string dimensionValue = 5;
  StatisticMonitoredObject monitoredObject = 6;
  string metricValues = 7;
  int32 period = 8;
  string startTime = 9;
  string endTime = 10;
  string statistics = 11;
  string apiKey = 12;
}

message GetMonascaStatisticResponse {
  int32 status = 1;
  string error = 2;
  string msg = 3;
  string currentTime = 4;
  StatisticData data = 5;
}

message StatisticMonitoredObject {
  string resourceValue = 1;
  string resourceName = 2;
  string attachmentName = 3;
  string attachmentId = 4;
  string device = 5;
}

message StatisticData {
  repeated Statistic docs = 1;
}

message Statistic {
  string nameMetric = 1;
  repeated string columns = 2;
  repeated StatisticItem statistics = 3;
  DimensionsInfo dimensions = 4;
}

message StatisticItem {
  string timestamp = 1;
  double value = 2;
}

message DimensionsInfo {
  string component = 1;
  string hostname = 2;
  string device = 3;
  string resourceId = 4;
  string service = 5;
  string zone = 6;
}

message DeleteGroupRequest {
  string regionId = 1;
  string portalProjectId = 2;
  string teamCodeId = 3;
  string groupId = 4;
}

message DeleteGroupResponse {
  int32 status = 1;
  string error = 2;
  string msg = 3;
  string currentTime = 4;
}

message GetResourceExternalsRequest {
  string teamCodeId = 1; // teamCodeId
  string token = 2; // token
  string regionId = 3; // region
  string portalProjectId = 4; // projectid
  string resourceValue = 5; // kubernetes ( fe )
  string q = 6;
  int32 page = 7;
  int32 size = 8;
  int32 resourceTypeId = 9;
  string apiKey = 10;
  string groupId = 11; // clusterId
}

message ResourceExternal {
  string encryptedKey = 1;
  string resourceId = 2;
  string name = 3;
  string status = 4;
  string configStatus = 5;
  string agentCode = 6;
  string resourceName = 7;
  string groupId = 8;
  repeated Attachment attachments = 9;
}

message ResourceExternalData{
  int32 page = 1;
  int32 size = 2;
  int32 total = 3;
  int32 totalPage = 4;
  repeated ResourceExternal docs = 5;
  bool isAttachment = 6;
}

message GetResourceExternalsResponse {
  int32 status = 1;
  string error = 2;
  string msg = 3;
  string currentTime = 4;
  ResourceExternalData data = 5;
}