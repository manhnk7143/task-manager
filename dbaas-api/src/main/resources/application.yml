
server:
  port: 8080

logging:
  config: classpath:log4j2.xml

spring:
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}
    ssl:
      enabled: true
      key-store: ${RABBIT_SSL.KEYSTORE}
      trust-store: ${RABBIT_SSL.TRUSTSTORE}
      key-store-type: ${RABBIT_SSL.KEYSTORE.TYPE}
      validate-server-certificate: ${RABBIT_SSL.VALIDATE_SERVER_CERT}
      verify-hostname: ${RABBIT_SSL.VERIFY_HOST_NAME}
      key-store-password: ${RABBIT_SSL.KEYSTORE_PASSWORD}
      trust-store-password: ${RABBIT_SSL.TRUSTSTORE_PASSWORD}
